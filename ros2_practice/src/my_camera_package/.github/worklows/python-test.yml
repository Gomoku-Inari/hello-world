name: Pure Python Unit Test (CI)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHubのリポジトリからコードをチェックアウト
    - uses: actions/checkout@v4

    # 2. 標準のPython環境（3.12）をセットアップ（ROSは一切入れない！）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. テストランナー（pytest）のインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # 4. 🌟 運命のユニットテスト実行！
    - name: Run Test with pytest
      run: |
        # パッケージへのパスを通しつつ、pytestを走らせる
        PYTHONPATH=. pytest test/test_state_machine.py -v
